<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Streamlit App</title>
    <!-- Use the new @stlite/browser CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Use the new @stlite/browser JS script -->
    <script src="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          entrypointUrl: "app.py",
          // reportlab was removed since it can cause browser crashes (the app will still run fine without it!)
          requirements: ["pandas", "openpyxl", "xlsxwriter"],
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
